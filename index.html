    <div class="formula-lite">即時沉陷簡化公式：Si = Δp × B × (1 - 0.3²) / Es。壓密沉陷採 Das 教科書常用之 2:1 應力分布法與 NC/OC 三分支判斷。</div>
    <div class="note">本工具採用 2:1 應力分布法簡化估算，未考慮土層分層變化、地下水位變動、次壓縮沉陷等因素，僅供初步評估，正式設計應由大地工程師依實際地質調查資料複核。</div>

<script>
function switchMobTab(name,btn){
  btn.parentElement.querySelectorAll('.mob-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  btn.parentElement.nextElementSibling.querySelectorAll('.card').forEach(function(c){
    c.classList.toggle('mob-active',c.dataset.tab===name);
  });
}
function openPro(){ JRH.checkEmail(function(){ jrhPrint('地層壓密沉陷量估算計算書'); }); }
function v(id){return parseFloat(document.getElementById(id).value)||0;}
function f2(x){return x.toFixed(2);}
function f3(x){return x.toFixed(3);}
function f6(x){return x.toFixed(6);}
function log10(x){return Math.log(x)/Math.LN10;}

function calcSettlement(inputs){
  var B=inputs.B, L=inputs.L, dp=inputs.dp, z1=inputs.z1, H=inputs.H;
  var e0=inputs.e0, Cc=inputs.Cc, Cr=inputs.Cr, sigma0=inputs.sigma0, sigmap=inputs.sigmap, Es=inputs.Es;
  var z=z1 + H/2;
  var dsigma=dp * (B * L) / ((B + z) * (L + z));
  var branch='', branchReason='', scM=0;
  if(sigmap <= sigma0){
    branch='NC';
    branchReason='因 σ\'p ≤ σ\'0，視為正常壓密土層，壓力歷程未顯示過壓密行為，故全段採 Cc 計算。';
    scM=(Cc * H) / (1 + e0) * log10((sigma0 + dsigma) / sigma0);
  }else if((sigma0 + dsigma) <= sigmap){
    branch='OC-RECOMP';
    branchReason='因 σ\'p > σ\'0，且作用後應力 σ\'0+Δσ 未超過 σ\'p，僅發生再壓密，故採 Cr 計算。';
    scM=(Cr * H) / (1 + e0) * log10((sigma0 + dsigma) / sigma0);
  }else{
    branch='OC-VIRGIN';
    branchReason='因 σ\'p > σ\'0，但作用後應力 σ\'0+Δσ 已超過 σ\'p，故先以 Cr 計至 σ\'p，再以 Cc 計算超過預壓密應力後之原始壓密。';
    scM=(Cr * H) / (1 + e0) * log10(sigmap / sigma0) + (Cc * H) / (1 + e0) * log10((sigma0 + dsigma) / sigmap);
  }
  var siM=dp * B * (1 - 0.3 * 0.3) / Es;
  var totalM=scM + siM;
  return {
    z:z,
    dsigma:dsigma,
    branch:branch,
    branchReason:branchReason,
    Sc_m:scM,
    Sc_mm:scM * 1000,
    Si_m:siM,
    Si_mm:siM * 1000,
    total_m:totalM,
    total_mm:totalM * 1000
  };
}

function calcSTL(){
  var inputs={
    B:v('stl-B'),
    L:v('stl-L'),
    dp:v('stl-dp'),
    z1:v('stl-z1'),
    H:v('stl-H'),
    e0:v('stl-e0'),
    Cc:v('stl-Cc'),
    Cr:v('stl-Cr'),
    sigma0:v('stl-sigma0'),
    sigmap:v('stl-sigmap'),
    Es:v('stl-Es')
  };
  var r=calcSettlement(inputs);
  var branchLabelMap={
    'NC':'正常壓密 NC',
    'OC-RECOMP':'過壓密 OC（未超過預壓密應力）',
    'OC-VIRGIN':'過壓密 OC（超過預壓密應力）'
  };

  document.getElementById('stl-result').innerHTML =
    '<table><tr><th>項目</th><th>數值</th></tr>'+
    '<tr><td>黏土層中點深度 z</td><td>'+f2(r.z)+' m</td></tr>'+
    '<tr><td>中點附加應力 Δσ</td><td>'+f2(r.dsigma)+' kPa</td></tr>'+
    '<tr><td>一次壓密沉陷 Sc</td><td>'+f2(r.Sc_mm)+' mm</td></tr>'+
    '<tr><td>即時沉陷 Si</td><td>'+f2(r.Si_mm)+' mm</td></tr>'+
    '<tr><td>總沉陷 Sc + Si</td><td>'+f2(r.total_mm)+' mm</td></tr>'+
    '<tr><td>壓密判定</td><td>'+branchLabelMap[r.branch]+'</td></tr>'+
    '</table>'+
    '<div class="note">Sc 以公尺計算後轉為 mm 顯示；Si 依簡化彈性法估算，未考慮形狀係數與分層剛度差異。</div>';

  var p='';
  p+='【地層壓密沉陷量估算計算過程】\n\n';
  p+='一、輸入條件\n';
  p+='  基礎寬度 B = '+f3(inputs.B)+' m\n';
  p+='  基礎長度 L = '+f3(inputs.L)+' m\n';
  p+='  基礎底面淨附加壓力 Δp = '+f3(inputs.dp)+' kPa\n';
  p+='  基礎底面至黏土層頂深度 z1 = '+f3(inputs.z1)+' m\n';
  p+='  黏土層厚度 H = '+f3(inputs.H)+' m\n';
  p+='  初始孔隙比 e0 = '+f3(inputs.e0)+'\n';
  p+='  壓縮指數 Cc = '+f3(inputs.Cc)+'\n';
  p+='  回彈指數 Cr = '+f3(inputs.Cr)+'\n';
  p+='  中點有效覆土應力 σ\'0 = '+f3(inputs.sigma0)+' kPa\n';
  p+='  中點預壓密應力 σ\'p = '+f3(inputs.sigmap)+' kPa\n';
  p+='  彈性模數 Es = '+f3(inputs.Es)+' kPa\n\n';
  p+='二、黏土層中點深度\n';
  p+='  z = z1 + H/2 = '+f3(inputs.z1)+' + '+f3(inputs.H)+'/2 = '+f6(r.z)+' m\n\n';
  p+='三、附加應力（2:1 應力分布法）\n';
  p+='  Δσ = Δp × (B×L) / ((B+z)×(L+z))\n';
  p+='     = '+f3(inputs.dp)+' × ('+f3(inputs.B)+'×'+f3(inputs.L)+') / (('+f3(inputs.B)+'+'+f6(r.z)+')×('+f3(inputs.L)+'+'+f6(r.z)+'))\n';
  p+='     = '+f6(r.dsigma)+' kPa\n\n';
  p+='四、一次壓密沉陷 Sc 判定\n';
  p+='  判定結果：'+branchLabelMap[r.branch]+'\n';
  p+='  判定理由：'+r.branchReason+'\n';
  if(r.branch==='NC'){
    p+='  Sc = (Cc×H)/(1+e0) × log10((σ\'0+Δσ)/σ\'0)\n';
    p+='     = ('+f3(inputs.Cc)+'×'+f3(inputs.H)+')/(1+'+f3(inputs.e0)+') × log10(('+f3(inputs.sigma0)+'+'+f6(r.dsigma)+')/'+f3(inputs.sigma0)+')\n';
    p+='     = '+f6(r.Sc_m)+' m = '+f3(r.Sc_mm)+' mm\n\n';
  }else if(r.branch==='OC-RECOMP'){
    p+='  Sc = (Cr×H)/(1+e0) × log10((σ\'0+Δσ)/σ\'0)\n';
    p+='     = ('+f3(inputs.Cr)+'×'+f3(inputs.H)+')/(1+'+f3(inputs.e0)+') × log10(('+f3(inputs.sigma0)+'+'+f6(r.dsigma)+')/'+f3(inputs.sigma0)+')\n';
    p+='     = '+f6(r.Sc_m)+' m = '+f3(r.Sc_mm)+' mm\n\n';
  }else{
    p+='  Sc = (Cr×H)/(1+e0) × log10(σ\'p/σ\'0) + (Cc×H)/(1+e0) × log10((σ\'0+Δσ)/σ\'p)\n';
    p+='     = ('+f3(inputs.Cr)+'×'+f3(inputs.H)+')/(1+'+f3(inputs.e0)+') × log10('+f3(inputs.sigmap)+'/'+f3(inputs.sigma0)+')\n';
    p+='       + ('+f3(inputs.Cc)+'×'+f3(inputs.H)+')/(1+'+f3(inputs.e0)+') × log10(('+f3(inputs.sigma0)+'+'+f6(r.dsigma)+')/'+f3(inputs.sigmap)+')\n';
    p+='     = '+f6(r.Sc_m)+' m = '+f3(r.Sc_mm)+' mm\n\n';
  }
  p+='五、即時沉陷 Si（簡化彈性法）\n';
  p+='  Si = Δp × B × (1 - 0.3²) / Es\n';
  p+='     = '+f3(inputs.dp)+' × '+f3(inputs.B)+' × (1 - 0.3²) / '+f3(inputs.Es)+'\n';
  p+='     = '+f6(r.Si_m)+' m = '+f3(r.Si_mm)+' mm\n\n';
  p+='六、總沉陷\n';
  p+='  St = Sc + Si = '+f6(r.Sc_m)+' + '+f6(r.Si_m)+' = '+f6(r.total_m)+' m\n';
  p+='     = '+f3(r.total_mm)+' mm\n\n';
  p+='七、說明\n';
  p+='  本工具以單一黏土層中點應力增量代表全層壓密效應，適用於初步估算。\n';
  p+='  若為分層土層、地下水位變動或需評估次壓縮沉陷者，應另行分層分析。\n';
  document.getElementById('stl-proc-text').textContent=p;
  document.getElementById('stl-proc').style.display='';
  if(window.innerWidth<768){var b=document.getElementById('mobTab-stl-r');if(b)switchMobTab('stl-r',b);}
  return r;
}

    document.getElementById('stl-L').value=(data.Lg_mm/1000).toFixed(2);
    calcSTL();
  });
});
</script>
